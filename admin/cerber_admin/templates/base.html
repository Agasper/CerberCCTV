<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CerberCCTV{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body{% block body_attrs %}{% endblock %}>
{% if not hide_nav %}
<nav class="navbar navbar-expand-sm border-bottom mb-4 bg-body-tertiary">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <img src="/static/icon.svg" width="26" height="26" alt="">CerberCCTV
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topnav"
            aria-controls="topnav" aria-expanded="false" aria-label="Меню">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="topnav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {{ 'active' if active == 'dashboard' }}" href="/">Дашборд</a></li>
        <li class="nav-item"><a class="nav-link {{ 'active' if active == 'events' }}" href="/events">События</a></li>
        <li class="nav-item"><a class="nav-link {{ 'active' if active == 'live' }}" href="/live">Live</a></li>
        <li class="nav-item"><a class="nav-link {{ 'active' if active == 'settings' }}" href="/settings">Настройки</a></li>
      </ul>
      <a class="nav-link text-secondary" href="/logout">Выйти</a>
    </div>
  </div>
</nav>
{% endif %}
<main class="container pb-5">
{% block content %}{% endblock %}
</main>
<script src="/static/vendor/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
