<div class="card event-card h-100">
  <a href="/events/{{ e.id }}" class="ratio ratio-16x9 event-thumb">
    {% if e.s3_key_thumb %}
      <img loading="lazy" src="/events/{{ e.id }}/thumb" alt="Превью события">
    {% else %}
      <div class="d-flex align-items-center justify-content-center text-secondary small">нет превью</div>
    {% endif %}
  </a>
  <div class="card-body py-2 px-3">
    <div class="d-flex justify-content-between align-items-center gap-2">
      <a href="/events/{{ e.id }}" class="link-body-emphasis text-decoration-none small">{{ e.started_at | dt }}</a>
      <form method="post" action="/events/{{ e.id }}/delete" class="m-0"
            data-confirm="Удалить событие и видео из хранилища?">
        <button type="submit" class="btn btn-sm btn-outline-danger border-0 py-0 px-1"
                title="Удалить событие">✕</button>
      </form>
    </div>
    <div class="text-secondary small">
      {{ e.duration_s | duration }} · {{ e.size_bytes | filesize }}
      {% if e.status == 'uploading' %}<span class="badge text-bg-warning ms-1">загружается</span>
      {% elif e.status == 'failed' %}<span class="badge text-bg-danger ms-1">ошибка</span>{% endif %}
    </div>
  </div>
</div>
