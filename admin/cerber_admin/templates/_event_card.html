<a class="event-card" href="/events/{{ e.id }}">
  {% if e.s3_key_thumb %}
    <img loading="lazy" src="/events/{{ e.id }}/thumb" alt="Превью события">
  {% else %}
    <div class="event-thumb-placeholder">нет превью</div>
  {% endif %}
  <div class="event-meta">
    <span>{{ e.started_at | dt }}</span>
    <span class="muted">{{ e.duration_s | duration }} · {{ e.size_bytes | filesize }}</span>
    {% if e.status == 'uploading' %}<span class="badge badge-warn">загружается</span>
    {% elif e.status == 'failed' %}<span class="badge badge-err">ошибка</span>{% endif %}
  </div>
</a>
