<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26333f"/>
      <stop offset="1" stop-color="#121920"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.38" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#57d1a5"/>
      <stop offset="0.55" stop-color="#2f8f6e"/>
      <stop offset="1" stop-color="#1d5c47"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141b22"/>
      <stop offset="1" stop-color="#0c1116"/>
