    <circle cx="32" cy="29.5" r="14" fill="#0b1015" stroke="#3fb68b" stroke-width="2.4"/>
    <circle cx="32" cy="29.5" r="8.2" fill="url(#lens)"/>
    <circle cx="32" cy="29.5" r="3.4" fill="#0b1015"/>
    <circle cx="35.8" cy="25.6" r="2" fill="#e8fbf3" opacity="0.9"/>
    <circle cx="45.5" cy="47.5" r="3" fill="#e5534b"/>
